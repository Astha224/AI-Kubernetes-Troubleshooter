apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      containers:
      - name: ai-backend
        image: ai-assistant-backend:v2
        imagePullPolicy: Never

        ports:
        - containerPort: 8000

        env:
        - name: OLLAMA_HOST
          value: "http://host.docker.internal:11434"