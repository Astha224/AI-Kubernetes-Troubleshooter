apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-assistant-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: ai.local
    http:
      paths:
      - backend:
          service:
            name: ai-frontend-service
            port:
              number: 80
        path: /
        pathType: Prefix
      - backend:
          service:
            name: ai-backend-service
            port:
              number: 8000
        path: /analyze
        pathType: Prefix
      - backend:
          service:
            name: ai-backend-service
            port:
              number: 8000
        path: /metrics
        pathType: Prefix
  tls:
  - hosts:
    - ai.local
    secretName: ai-local-tls